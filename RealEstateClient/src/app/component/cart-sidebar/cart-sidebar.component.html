<p-drawer [(visible)]="visible" position="left" [style]="{width: '400px'}" (onHide)="closeSidebar()">
  <ng-template pTemplate="header">
    <h3 class="m-0 flex align-items-center gap-3">
      <i class="pi pi-shopping-cart"></i>
      <span>הסל שלי ({{ cartItems.length }})</span>
    </h3>
  </ng-template>

  <div *ngIf="cartItems.length === 0" class="empty-state text-center p-5">
    <i class="pi pi-shopping-cart text-6xl text-400 mb-3"></i>
    <p class="text-600">הסל ריק</p>
  </div>

  <div *ngIf="cartItems.length > 0" class="cart-items-container">
    <div *ngFor="let item of cartItems; let i = index" 
         class="cart-item mb-3 p-3 border-1 border-200 border-round">
      <div class="flex gap-3">
        <img [src]="item.imageUrl" [alt]="item.title" 
             style="width: 80px; height: 80px; object-fit: cover;" 
             class="border-round cart-image">
        
        <div class="flex-grow-1">
          <h4 class="m-0 mb-1 text-sm">{{ item.title }}</h4>
          <p class="text-xs text-600 m-0 mb-1 flex align-items-center gap-2">
            <i class="pi pi-map-marker"></i>
            <span>{{ item.city }}</span>
          </p>
          <p class="text-xs text-600 m-0 mb-1">
            <span class="p-tag p-tag-sm" [ngClass]="{
              'p-tag-info': item.transactionType === 'מכירה',
              'p-tag-success': item.transactionType === 'השכרה',
              'p-tag-warning': item.transactionType === 'נופש'
            }">{{ item.transactionType }}</span>
          </p>
          <p *ngIf="item.startDate && item.endDate" class="text-xs text-600 m-0 mb-2 flex align-items-center gap-2">
            <i class="pi pi-calendar"></i>
            <span>{{ item.startDate | date:'dd/MM' }} - {{ item.endDate | date:'dd/MM' }}</span>
          </p>
          <p class="text-primary font-bold m-0">₪{{ item.price | number }}</p>
        </div>

        <button pButton icon="pi pi-trash" 
                class="p-button-rounded p-button-text p-button-danger delete-btn"
                (click)="removeItem(item.productId)"></button>
      </div>
    </div>

    <div class="border-top-1 border-200 pt-3 mt-3 cart-footer">
      <div class="flex justify-content-between align-items-center mb-3 total-section">
        <span class="font-bold text-lg">סה"כ:</span>
        <span class="text-primary font-bold text-2xl">₪{{ getTotalPrice() | number }}</span>
      </div>

      <button pButton label="עבור לסל המלא" icon="pi pi-shopping-cart" 
              iconPos="right"
              class="w-full mb-2 action-btn" (click)="goToCart()"></button>
      
      <button pButton label="המשך לקניות" icon="pi pi-arrow-left" 
              iconPos="right"
              class="w-full mb-2 p-button-outlined action-btn" (click)="goToProducts()"></button>
      
      <button pButton label="סיום הזמנה" icon="pi pi-check" 
              iconPos="right"
              class="w-full p-button-success action-btn" (click)="goToCheckout()"></button>
    </div>
  </div>
</p-drawer>
